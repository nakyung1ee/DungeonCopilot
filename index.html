ric span{display:block;margin-top:4px;color:var(--muted);font-weight:700;font-size:13px}.stage{display:none}.stage.active{display:block;animation:rise .38s ease both}@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}.stage-card{border:1px solid var(--line);border-radius:38px;background:var(--glass-strong);backdrop-filter:blur(26px);box-shadow:var(--shadow);overflow:hidden}.stage-head{position:relative;padding:34px 34px 24px;background:linear-gradient(135deg,rgba(124,58,237,.13),rgba(6,182,212,.10),rgba(236,72,153,.09));border-bottom:1px solid var(--line)}.stage-kicker{font-size:14px;color:var(--muted);font-weight:850}.stage-title{margin:6px 0 10px;font-size:clamp(30px,4.7vw,56px);letter-spacing:-.045em;line-height:1.03}.stage-desc{max-width:850px;color:var(--muted);font-size:18px;line-height:1.72;margin:0}.content{padding:30px 34px 36px}.media{margin:24px 0;border-radius:28px;border:1px solid var(--line);background:rgba(255,255,255,.28);padding:12px;overflow:hidden}.media img{display:block;width:100%;border-radius:20px;object-fit:cover}.steps{counter-reset:step;display:grid;gap:14px;margin:24px 0}.step{counter-increment:step;display:grid;grid-template-columns:44px 1fr;gap:14px;align-items:start;padding:18px;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.35)}@media (prefers-color-scheme:dark){.step,.media{background:rgba(255,255,255,.06)}}.step::before{content:counter(step);width:38px;height:38px;border-radius:14px;display:grid;place-items:center;color:white;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--blue));box-shadow:0 8px 22px rgba(37,99,235,.20)}.section-title{margin:30px 0 10px;font-size:24px;letter-spacing:-.03em}.prompt{margin:16px 0;border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg,rgba(255,255,255,.62),rgba(255,255,255,.32));overflow:hidden}@media (prefers-color-scheme:dark){.prompt{background:linear-gradient(180deg,rgba(255,2 :1fr}.step{grid-template-columns:1fr}.step::before{width:34px;height:34px}.toolbar{border-radius:22px}.tab{padding:11px 13px}}

<body>
  <div class="noise"></div><div class="wrap">
    <section class="hero" id="top"><div class="hero-copy"><span class="eyebrow"><span class="pulse"></span>Dungeon & Copilot 7</span><h1><span class="grad">던전앤<br>코파일럿7</span></h1><p class="lead">GPT-5로 더 강력해진 Copilot을 활용해 시장 트렌드 탐색, 데이터 분석, 브랜드 기획, 프레젠테이션 제작까지 수행하는 보드게임형 실습 여정입니다.</p><div class="hero-actions"><button class="btn" onclick="goStage(0)">모험 시작하기</button><button class="btn secondary" onclick="document.querySelector('.toolbar').scrollIntoView({behavior:'smooth'})">Stage 보기</button></div><div class="chipline"><span class="chip">Single index.html</span><span class="chip">No iframe</span><span class="chip">Date unlock</span><span class="chip">Responsive</span></div></div><div class="hero-card"><span class="orb one"></span><span class="orb two"></span><img src="https://raw.githubusercontent.com/microsoft/DungeonCopilot/main/dnc7_k/img/titlelogo.png" alt="던전앤코파일럿7 로고" onerror="this.style.display='none'"></div></section>
    <nav class="toolbar" aria-label="Stage navigation"></nav>
    <section class="dashboard"><div class="metric"><b id="openCount">-</b><span>Unlocked stages</span></div><div class="metric"><b>8</b><span>Total stages</span></div><div class="metric"><b id="todayLabel">-</b><span>Today</span></div><div class="metric"><b id="startLabel">-</b><span>Stage 1 open date</span></div></section>

<script>
const ASSET='https://raw.githubusercontent.com/microsoft/DungeonCopilot/main/dnc7_k/img/';

const params=new URLSearchParams(location.search); if(params.get('startDate')) startDate=params.get('startDate').replaceAll('-','');
const stages=[
{t:'Stage 0: 여정의 시작',k:'Welcome',img:'intro.png',d:'던전앤코파일럿의 세계에 오신 것을 환영합니다. 귀여운 캣파일럿과 함께 여섯 개의 퀘스트를 하나씩 건너며 나만의 식당을 디자인해보세요.',steps:['지금부터 GPT-5로 더욱 막강해진 코파일럿을 이용해 다양한 퀘스트를 수행합니다.','주변 동료와 다양한 경험과 의견을 나누며 즐겁게 플레이합니다.','시장 트렌드 탐색부터 데이터 분석, 창의적 기획까지 보드게임처럼 즐기는 실습형 여정을 시작합니다.'],sections:[['준비되셨나요?','모험을 시작하세요!']]},
{t:'⚔️ Stage 1: 트렌드를 알아보자!',k:'Trend Research',img:'quest1.png',d:'요즘 무엇이 인기 있는지 외식업 트렌드를 알아보는 퀘스트입니다.',steps:['실습파일에서 “2024 식품외식산업 7대 이슈.pdf”, “2025 식품외식산업 7대 이슈.pdf” 파일을 다운로드합니다.','https://m365.cloud.microsoft/chat/ 로 이동하여 Copilot Chat을 엽니다.','프롬프트 입력창에서 파일 업로드를 선택하고 다운로드한 실습파일을 지정합니다.','아래 샘플 프롬프트를 입력합니다. [대괄호] 부분은 취향에 따라 수정합니다.','내용을 창의적으로 변경하며 마음에 들 때까지 다시 생성합니다.'],imgs:['upload.png'],sections:[['자료 이해하기','외식 산업 리포트의 내용을 이해하고 인사이트를 도출합니다.'],['[샘플 프롬프트]','“2024 식품외식산업 7대 이슈.pdf”, “2025 식품외식산업 7대 이슈.pdf” 파일에서 주요 이슈별 내용과 언급된 예시들을 요약해서 작성해줘.\n\n각 연도의 7대 이슈를 한 문장씩 요약하고 이슈별 공통점과 차이점을 표로 정리해줘.\n\n2024년과 2025년 이슈 중 [키워드1]과 [키워드2]의 각 키워드별 성장률, 시장 규모, 주요 성장 동인 변화를 비교해줘.']]},
{t:'Stage 2: 수집한 정보를 정리하자!',k:'Synthesis',img:'quest2.png',d:'리포트에 없는 최신 정보까지 확인하고 수집한 내용을 보고서 초안으로 정리합니다.',steps:['아래 샘플 프롬프트를 이어서 입력합니다. [대괄호] 부분은 취향에 따라 수정합니다.','내용을 창의적으로 변경해보며 마음에 들 때까지 다시 생성합니다.'],imgs:['pages.png'],sections:[['웹 정보 확인하기','웹 데이터를 활용하여 최신 정보를 확인하고 추가 정보를 수집합니다.'],['[샘플 프롬프트]','지난 2020년도부터 2023년까지의 식품외식산업 이슈는 어떤 것들이 있었는지 웹데이터를 기반으로 연도별로 정리해줘.\n\n2026년도 키워드도 예측해줘. 그 키워드로 제안할 수 있는 마케팅 전략과 대표적인 성공 사례도 알려줘.'],['보고서 형태로 정리하기','수집된 정보를 종합하여 요약, 정리합니다.'],['[샘플 프롬프트]','답변 내용들을 종합하여, [주제]에 대해 정리하고 팀원들에게 공유할 수 있도록 보고서 초안을 작성해줘.']],tip:'답변의 내용을 “Pages로 편집”을 선택하여 문서화할 수 있습니다.'},
{t:'Stage 3: 데이터를 분석하자!',k:'Excel Analysis',img:'quest3.png',d:'통계 데이터를 활용하여 시장과 상권을 분석하고 인사이트를 확인합니다.',steps:['실습파일에서 “서울지역상권데이터.xlsx” 파일을 다운로드합니다.','Excel을 실행하고 파일을 연 뒤, Copilot 사용을 위해 “복사본 저장/다른 이름으로 저장”으로 OneDrive에 업로드합니다.','Excel 홈 메뉴 오른쪽의 Copilot 아이콘 아래 화살표를 선택하고 “앱기술” 메뉴를 선택합니다.','아래 샘플 프롬프트를 입력합니다.','내용을 창의적으로 변경하며 데이터 인사이트를 확인합니다.','더 심층적인 데이터 분석이 필요하면 고급 분석을 사용할 수 있습니다.','프롬프트 창에 “고급 분석 모드를 사용하여 더 심층적인 결과 얻기”를 입력합니다.','고급 분석 모드 “시작” 버튼을 선택합니다.'],imgs:['excel_copilot.png','advanced.png'],sections:[['데이터 분석하기','통계 정보를 활용하여 데이터를 분석하고 인사이트를 확인합니다.'],['[샘플 프롬프트]','지역별 유동인구 컬럼을 추가해줘\n\n가게당 유동인구수를 구해서 “유동인구비율” 컬럼을 추가해줘\n\n유동인구비율이 높은 지역 5개를 보여줘\n\n지역별 가게 생존율 컬럼을 추가해줘. 전체가게 3년 생존율을 알고싶어\n\n3년 생존율의 평균이 얼마야?\n\n지역별 2024년 개업가게수와 폐업가게수를 추가해줘\n\n폐업율 컬럼을 추가해줘\n\n개업가게수보다 폐업가게수가 높은 지역을 하이라이트해줘'],['데이터 고급 분석하기','고급분석 모드로 심층적인 분석을 진행합니다.'],['[샘플 프롬프트]','유동인구와 3년 생존율 간의 상관관계 시각화\n\n프렌차이즈 가게의 비율과 3년 생존율의 상관관계는?\n\n프랜차이즈 비율이 높은 상위/하위 지역별 3년 생존율 비교\n\n지역별 개업가게수 트렌드 시각화해줘\n\n상권을 점수화하고 싶어. 점수화 모델을 제안해줘\n\n상권 점수화에 사용할 변수별 가중치 추천 요청\n\n추천된 가중치로 상권 점수 산출']]},
{t:'Stage 4: 데이터를 더 들여다보자!',k:'Copilot Chat Analysis',img:'quest4.png',d:'Copilot Chat을 활용해 데이터 인사이트를 바탕으로 시장, 상권, 타겟 고객을 구체화합니다.',steps:['Copilot Chat으로도 데이터 분석을 진행합니다.','Excel 홈 메뉴의 Copilot 버튼을 클릭하거나 아래 화살표에서 채팅을 선택하여 Copilot Chat으로 이동합니다. 또는 https://m365.cloud.microsoft/chat/ 에서 시작합니다.','프롬프트 입력창에서 파일 업로드를 선택하고 실습파일을 지정합니다.','아래 샘플 프롬프트를 이어서 입력합니다.','내용을 창의적으로 변경해보면서 마음에 들 때까지 다시 생성합니다.'],imgs:['excel_chat.png','upload.png'],sections:[['데이터 분석하기','통계 데이터를 시각화하고 대화 흐름을 이어가며 분석합니다.'],['[샘플 프롬프트]','서울의 각 구 [유동인구]와 [가게수] 간의 관계를 시각화해줘. 이제 모든 시각화 요청은 plotly를 이용해서 그래프를 그려줘\n\n[중구] 개업/폐업 추이를 시각화해줘\n\n유동인구수와 생존율에 상관관계가 있어?\n\n각 구의 신생가게수와 3년생존률을 히트맵으로 시각화해줘\n\n프랜차이즈 비중과 전체 3년 생존율의 산점도 + 회귀선 + 상관계수를 그려 프랜차이즈 비중이 높을수록 생존율이 어떠한 경향을 보이는지 알려줘\n\n[20대]와 [40대]의 소비 스타일 선호도 차이를 막대 그래프로 시각화해줘\n\n[20대]를 타겟으로 식당을 오픈하려고 해. [유동인구]와 [3년 생존율]을 참고하여 어떤 지역에서 가게를 준비하면 좋을지 제안해줘. 2개의 지역을 제안하고, 각각의 장단점을 비교해서 표 형태로 보여줘.']]},
{t:'⚡ Stage 5: 이제 나만의 식당을 만들어보자!',k:'Brand Creation',img:'quest5.png',d:'분석한 정보를 바탕으로 나만의 식당 스토리텔링을 시작합니다.',steps:['이 퀘스트는 창의력이 필요합니다. 샘플 프롬프트는 참고만 하고 나만의 프롬프트를 사용합니다.','아이디어가 없어도 괜찮습니다. 대화를 이어가며 아이디어를 구체화하고 마음에 들 때까지 질문합니다.'],imgs:['menu.png'],sections:[['1. 브레인스토밍','외식 트렌드와 시장/상권/타겟 분석을 바탕으로 어떤 가게를 만들지 아이디어를 모아봅니다.'],['[샘플 프롬프트]','광화문 지역에서 [20대]를 타겟으로 하는 식당을 오픈하려고 해. 추천해줄 수 있는 외식업 종류를 그 근거와 함께 알려줘. 상권의 입지별 장,단점도 고려해서 추천해줘.\n\n일반적인 퓨전 레스토랑이 아닌 더 특색 있고 흔하지 않은 컨셉으로 추천해줘.\n\n광화문 상권을 공략하는 마케팅 전략도 제안해줘.'],['2. 가게 브랜딩','어울리는 이름을 찾고 스토리를 만들어봅니다.'],['[샘플 프롬프트]','해당 컨셉을 바탕으로 광화문의 새로운 [양식당]에 어울리는 이름을 추천해줘.\n\n한국식 느낌이 강하게 영어를 최소화한 퓨전 양식당 이름을 추천해줘.\n\n프랑스어를 활용해서 매력적인 이름이 없을까?\n\n제안해준 “Seoul Spoon” 이름에 맞는 식당을 오픈하려고 해. 2025년 트렌드를 반영해서 식당을 홍보하기 위한 흥미로운 컨셉과 짧은 스토리, 홍보 아이디어를 제안해줘. 상권과 타겟 고객을 공략할 수 있는 아이디어를 포함하고 고객들이 관심을 가지고 기억할 수 있는 스토리로 만들어줘.'],['3. 메뉴 구성','우리 식당 컨셉에 맞는 시그니처 메뉴를 구성합니다.'],['[샘플 프롬프트]','식당의 메뉴 구성 아이디어를 알려줘. 로컬X글로벌 퓨전 레스토랑 컨셉에 맞는 메뉴 5가지를 구성해줘.\n\n이 메뉴들을 기반으로 레시피를 작성해줘.\n\n메뉴판을 구성하기 위한 가격대, 플레이팅 스타일, 영양 정보를 작성해줘.\n\n우리 식당에서만 맛볼 수 있는 특색 있는 시그니처 메뉴를 개발해줘.'],['4. 맞춤형 이미지 생성','식당을 대표하는 로고, 메뉴판, 홍보 배너 등의 이미지를 생성합니다.'],['[샘플 프롬프트]','Seoul Spoon 이라는 이름이 마음에 들어. 식당 컨셉에 맞는 식당 로고 이미지를 생성해줘.\n\n애니메이션 캐릭터들이 우리 식당에 방문하는 이미지를 그려줘.\n\n건강식이 연상되도록 초록색을 강조하고, 한글 요소도 반영해줘.\n\n우리 식당의 시그니처 메뉴를 잘 표현하는 메뉴판을 디자인해줘.\n\n식당 홍보를 위한 포스트에 사용할 배너를 디자인해줘.']]},
{t:'Stage 6: 나의 식당을 소개합니다.',k:'Proposal & Deck',img:'quest6.png',d:'시장 분석, 식당의 기획 의도부터 메뉴까지 모든 것을 브랜드 기획서에 담아봅니다.',steps:['Word를 실행하고 새 문서를 선택하여 빈 페이지를 엽니다.','본문 영역의 Copilot 아이콘을 선택하거나 Alt+i 단축키로 프롬프트 입력창을 엽니다.','아래 샘플 프롬프트를 입력합니다.','내용을 창의적으로 변경해보면서 마음에 들 때까지 다시 생성합니다.','각 아젠다의 내용을 Word Copilot으로 새로 작성하거나 일부 영역을 선택하여 수정합니다.','Copilot Chat 대화 기록에서 콘텐츠, 이미지, Excel 차트 등을 가져와 문서에 추가합니다.'],imgs:['word_prompt.png','word_edit.png','word_chat.png','ppt_create.png','ppt_chat.png'],sections:[['브랜드 기획서 템플릿 생성','내용을 종합하여 보고서 초안을 작성합니다. 아젠다를 제시하여 보고서 템플릿에 맞게 작성합니다.'],['[샘플 프롬프트]','식당의 기획서를 작성하려고 해. 포함할 아젠다를 제안해줘.\n\n다음 아젠다로 기획서 템플릿을 작성해줘. [1. 브랜드 개요, 2. 타겟 고객 분석, 3. 메뉴 및 서비스 구성, 4. 브랜드 아이덴티티, 5. 데이터 기반 마케팅 전략, 6. 목표 및 실행계획]\n\n데이터 기반 마케팅 전략을 더 디테일하게 작성해줘. 아래 항목으로 구체화해줘. [1. 생존 예측, 2. 입지 선정 이유, 3. 경쟁 분석 및 차별화 전략]'],['기획서 컨텐츠 작성','각 아젠다의 세부 내용을 입력합니다.'],['[샘플 프롬프트]','(빈 영역에서 Copilot 아이콘 선택) 브랜드 개요를 작성하고 싶어. 나의 가게는 (아이디어 설명). (차별화 포인트)를 강조하는 브랜드 개요의 초안을 작성해줘. 전문적인 용어를 사용하고 간결하게 작성해줘.\n\n(작성된 내용의 일부를 선택 후 Copilot 아이콘 선택) 이 내용을 간결하게 요약하고 글머리 기호로 다시 작성해줘.'],['Bonus Stage: 프리젠테이션 작성','완성된 기획서를 바탕으로 PowerPoint 프리젠테이션을 생성합니다.'],['[샘플 프롬프트]','다음에 대한 프리젠테이션을 만들어줘 /(참조파일)\n\n다음에 대한 프리젠테이션을 만들어줘 /(참조파일). 특히 (특정 아젠다) 부분을 강조하고, 시각적 요소를 많이 넣어서 청중이 관심을 가질 수 있도록 해줘.']],tip:'디자인 선택에서 원하는 템플릿을 지정하여 프리젠테이션을 생성할 수 있습니다.'},
{t:'축하합니다. Congrats! You Did It',k:'Finale',img:'end.png',d:'축하합니다! 모든 퀘스트를 완료했습니다. Copilot과 함께한 여정이 즐거웠기를 바랍니다.',steps:['당신은 진정한 영웅입니다.','모든 퀘스트를 완료하였습니다.','Copilot에 대해 더 알고 싶다면 아래 링크를 방문해 보세요.'],sections:[['더 알아보기','<div class="links"><a href="https://aka.ms/CopilotPromptGallery" target="_blank" rel="noopener">Copilot Prompt Gallery</a><a href="https://adoption.microsoft.com/copilot-scenario-library/" target="_blank" rel="noopener">Copilot Scenario Library</a><a href="https://techcommunity.microsoft.com/category/microsoft365copilot/blog/microsoft365copilotblog" target="_blank" rel="noopener">Microsoft 365 Copilot Blog</a><a href="https://www.youtube.com/@MicrosoftKorea" target="_blank" rel="noopener">Microsoft Korea YouTube 채널</a></div>']]}
];

function parseDate(s){return new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));} function fmt(d){return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`}
const today=new Date(); today.setHours(0,0,0,0); const start=parseDate(startDate); start.setHours(0,0,0,0);
function openDate(i){ if(i===0)return null; const d=new Date(start); d.setDate(start.getDate()+i-1); return d; } function unlocked(i){ const d=openDate(i); return !d || today>=d; }
function render(){ toolbar.innerHTML=stages.map((s,i)=>`<button class="tab ${i===current?'active':''} ${unlocked(i)?'':'locked'}" onclick="goStage(${i})">Stage ${i}${unlocked(i)?'':' 🔒'}</button>`).join(''); root.innerHTML=stages.map((s,i)=>`<article class="stage ${i===current?'active':''}" id="stage-${i}"><div class="stage-card"><header class="stage-head"><div class="stage-kicker">${s.k}</div><h2 class="stage-title">${s.t}</h2><p class="stage-desc">${s.d}</p></header><div class="content">${s.img?`<div class="media"><img src="${ASSET+s.img}" alt="${s.t}" onerror="this.closest('.media').style.display='none'"></div>`:''}<div class="steps">${(s.steps||[]).map(x=>`<div class="step">${x}</div>`).join('')}</div>${(s.imgs||[]).map(img=>`<div class="media"><img src="${ASSET+img}" alt="실습 화면" onerror="this.closest('.media').style.display='none'"></div>`).join('')}${(s.sections||[]).map(([a,b])=>`<h3 class="section-title">${a}</h3><div class="prompt"><div class="prompt-title">${a.includes('샘플')?'Sample Prompt':'Quest Note'}</div><div class="prompt-body">${String(b).includes('<div')?b:String(b).split('\n\n').map(p=>`<div class="quote">${p}</div>`).join('')}</div></div>`).join('')}${s.tip?`<div class="tip">💡 ${s.tip}</div>`:''}</div></div></article>`).join(''); $('#openCount').textContent=stages.filter((_,i)=>unlocked(i)).length; $('#todayLabel').textContent=fmt(today); $('#startLabel').textContent=fmt(start); }
function toast(msg){const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(window.__toast); window.__toast=setTimeout(()=>t.classList.remove('show'),2600)}
function goStage(i){ if(!unlocked(i)){toast(`Stage ${i}은 ${fmt(openDate(i))}에 개방됩니다.`); return;} current=i; render(); setTimeout(()=>document.querySelector('.stage.active').scrollIntoView({behavior:'smooth',block:'start'}),40)}
function prevStage(){ for(let i=current-1;i>=0;i--){ if(unlocked(i)){goStage(i);return;} } toast('첫 번째 Stage입니다.');}
function nextStage(){ for(let i=current+1;i<stages.length;i++){ if(unlocked(i)){goStage(i);return;} toast(`다음 Stage는 ${fmt(openDate(i))}에 개방됩니다.`); return;} toast('모든 Stage를 완료했습니다!');}
render();
</script>
</body>
